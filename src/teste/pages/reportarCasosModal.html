<div id="modalReportarAnimal" class="modal-overlay-report">
    <div class="modal-content-report">
        <span class="close-report" id="closeReportModal">&times;</span>
        <h2>Reportar Animal</h2>
        
        <form id="formReportarAnimal">
            <div class="input-group">
                <input type="text" id="reportRua" placeholder="Localização / Nome da Rua" required>
            </div>

            <label class="section-label">Tipo de Animal:</label>
            <div class="btn-group-options">
                <label class="opt-btn opt-orange">
                    <input type="radio" name="reportTipo" value="Cachorro" checked> Cachorro
                </label>
                <label class="opt-btn opt-blue">
                    <input type="radio" name="reportTipo" value="Gato"> Gato
                </label>
            </div>

            <div class="row-group">
                <div class="input-group half">
                    <select id="reportPorte" required>
                        <option value="" disabled selected>Porte</option>
                        <option value="Pequeno">Pequeno</option>
                        <option value="Medio">Médio</option>
                        <option value="Grande">Grande</option>
                    </select>
                </div>
                <div class="input-group half">
                    <select id="reportSaude" required>
                        <option value="" disabled selected>Estado</option>
                        <option value="Saudavel">Aparentemente Saudável</option>
                        <option value="Ferido">Ferido / Machucado</option>
                        <option value="Desnutrido">Desnutrido</option>
                        <option value="EmPerigo">Em Perigo</option>
                    </select>
                </div>
            </div>

            <label class="section-label">Cuidados fornecidos:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="reportCuidados" value="Agua"> Dei Água</label>
                <label><input type="checkbox" name="reportCuidados" value="Comida"> Dei Comida</label>
                <label><input type="checkbox" name="reportCuidados" value="Abrigo"> Abrigo Temporário</label>
            </div>

            <label class="section-label">Adicionar Foto:</label>
            <div class="input-group">
                <input type="file" id="reportFoto" accept="image/*" required>
            </div>

            <div class="input-group">
                <textarea id="reportComentario" placeholder="Observações e detalhes sobre o animal..." rows="3"></textarea>
            </div>

            <button type="submit" class="btn-submit-report">Registrar Marcação</button>
        </form>
    </div>
</div>
