<div id="loginModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>

        <div id="formLoginBox" style="display: block;">
            <img src="../../img/logodog.png" alt="Logo do Portal" class="modal-logo">
            <h2>Bem-vindo!</h2>
            <form id="formAcaoLogin" class="login-form">
                <input type="email" id="loginEmail" placeholder="Seu E-mail" required>
                <input type="password" id="loginSenha" placeholder="Sua Senha" required>
                <button type="submit" class="btn-entrar">Entrar</button>
                <p class="register-link">Não tem uma conta? <a href="#" id="showRegister">Cadastre-se</a></p>
            </form>

            <div class="forgot-buttons-container">
                <button type="button" class="btn-esqueci" onclick="window.location.href='EsqueciSenha.html'">Esqueci a Senha</button>
                <button type="button" class="btn-esqueci" onclick="window.location.href='EsqueciUsuario.html'">Esqueci o Usuário</button>
            </div>
        </div>

        <div id="formRegisterBox" style="display: none;"> 
            <h2>Criar Conta</h2>
            <form id="formAcaoCadastro" class="login-form">
                <input type="text" id="cadNome" placeholder="Nome Completo" required>
                <input type="email" id="cadEmail" placeholder="Seu E-mail" required>
                
                <p class="input-label" style="text-align: left; margin: 10px 0 5px; font-size: 14px; font-weight: bold; color: #555;">
                    <i class="fab fa-whatsapp" style="color: #25D366;"></i> WhatsApp:
                </p>
                <div class="phone-group">
                    <input type="tel" id="cadDDD" placeholder="DDD" maxlength="2" required style="width: 25%;">
                    <input type="tel" id="cadTelefone" placeholder="Número (ex: 98765-4321)" maxlength="10" required style="width: 75%;">
                </div>

                <input type="password" id="cadSenha" placeholder="Crie uma Senha" required>
                <input type="password" id="cadConfirmaSenha" placeholder="Confirme a Senha" required>

                <p>Selecione seu perfil:</p>
                <div class="button-group">
                    <button type="button" class="btn-perfil btn-adotante">Adotante</button>
                    <button type="button" class="btn-perfil btn-voluntario">Voluntário</button>
                    <button type="button" class="btn-perfil btn-apoiador">Apoiador</button>
                </div>

                <button type="submit" class="btn-cadastrar">Finalizar Cadastro</button>
                <p class="register-link">Já tem uma conta? <a href="#" id="showLogin">Faça Login</a></p>
            </form>
        </div>
    </div>
</div>
