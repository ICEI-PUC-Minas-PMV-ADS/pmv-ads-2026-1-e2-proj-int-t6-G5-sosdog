<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil - Pet SOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/EditarPerfil.css">
</head>
<body>

  <main class="edit-profile-container">
    
    <div class="header-title">
      <a href="home.html" title="Voltar ao Painel" aria-label="Voltar ao painel">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h2>Editar perfil</h2>
    </div>

    <section class="profile-photo-card">
      <div class="profile-info">
        <img
          src="https://placehold.co/60x60/4f7c75/white?text=U"
          alt="Foto de Perfil"
          id="foto-perfil-edit"
          class="img-perfil-global"
        >
        <div class="profile-names">
          <span class="username" id="username-edit">@usuario</span>
          <span class="fullname nome-perfil-global" id="fullname-edit">Nome do Usuário</span>
        </div>
      </div>
      
      <input type="file" id="input-foto-arquivo" name="foto_perfil" accept="image/*" hidden>

      <button type="button" class="btn-change-photo" id="btn-mudar-foto">
        Mudar foto
      </button>
    </section>

    <form id="form-editar-perfil" novalidate>
      
      <div class="form-group">
        <label for="input-nome-edit">Nome Completo</label>
        <input type="text" id="input-nome-edit" name="nome_completo" required>
      </div>

      <div class="form-group">
        <label for="input-perfil-edit">Tipo de Conta</label>
        <select id="input-perfil-edit" name="tipo_conta">
          <option value="Adotante">Adotante</option>
          <option value="Voluntário">Voluntário</option>
          <option value="Apoiador">Apoiador</option>
          </select>
      </div>

      <div class="form-group">
        <label for="input-site-edit">Site</label>
        <input type="url" id="input-site-edit" name="site">
      </div>

      <div class="form-group">
        <label for="input-bio-edit">Bio</label>
        <div class="textarea-wrapper">
          <textarea id="input-bio-edit" name="bio" maxlength="150"></textarea>
          <span id="contador-bio">0 / 150</span>
        </div>
      </div>

      <div class="form-group toggle-group">
        <label for="input-selo-edit">Mostrar selo</label>
        <input type="checkbox" id="input-selo-edit" name="mostrar_selo">
      </div>

      <div class="form-group">
        <label for="input-genero-edit">Gênero</label>
        <select id="input-genero-edit" name="genero">
          <option value="feminino">Feminino</option>
          <option value="masculino">Masculino</option>
          <option value="nao-informar">Prefiro não informar</option>
        </select>
      </div>

      <div class="form-group toggle-group">
        <label for="input-alertas-edit">Alertas</label>
        <input type="checkbox" id="input-alertas-edit" name="alertas_urgentes">
      </div>

      <button type="submit">Salvar</button>
    </form>
  </main>

  <script src="../javascript/EditarPerfil.js"></script>
</body>
</html>
